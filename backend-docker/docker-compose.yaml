services:
  postgres:
    image: postgres:16-alpine
    container_name: book-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  ollama-api:
    image: ollama/ollama
    entrypoint: /bin/bash
    command:
      - -c
      - |
        ollama serve &
        # wait for ollama to start bigger number may be needed for slower machines
        sleep 10
        # edit the below line if you want to change the mmodel
        ollama pull qwen3:1.7b
        sleep infinity
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "11434:11434"

  app:
    image: chappatted/mas-rad-java-backend
    container_name: book-api
    depends_on:
      postgres:
        condition: service_healthy
      ollama-api:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"

volumes:
  postgres_data:
